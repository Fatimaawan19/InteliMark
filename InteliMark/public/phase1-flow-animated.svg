  <path class="arrow" d="M560,925 L620,925"/>

  <!-- Animated flow dots -->
  <circle r="8" fill="#e0f2fe" filter="url(#glow)">
    <animateMotion dur="12s" repeatCount="indefinite" path="M280,205 L340,205 L580,205 L640,205 L860,205 L920,205 L1050,250 L1050,310 L810,310 L810,340 L350,385 L420,385 L640,385 L710,385 L840,430 L180,430 L180,520 L300,565 L360,565 L600,565 L660,565 L780,610 L240,610 L240,700 L350,745 L420,745 L640,745 L710,745 L830,790 L450,790 L450,880 L280,925 L340,925 L560,925 L620,925"/>
  </circle>

  <!-- Footer -->
  <text x="800" y="1050" text-anchor="middle" class="subtitle">Complete workflow: Upload → Ingest → Index → Assess → Mark → Feedback</text>
  <text x="800" y="1100" text-anchor="middle" class="sub" fill="#94a3b8">Status: uploaded → extracted → embedded → queryable → assessed → mark

  <!-- ROW 5: OUTPUT -->
  <text x="85" y="860" class="sub" fill="#fbbf24">📊 STEP 5: Output & Feedback</text>

  <rect x="60" y="880" rx="20" ry="20" width="220" height="90" fill="#10b981" filter="url(#glow)">
