<svg width="1600" height="1100" viewBox="0 0 1600 1100" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Phase 1: AutoMark RAG - Intelligent Assessment Marking System</title>
  <desc id="desc">Complete flow: Teacher uploads course materials → Extract and embed → ChromaDB indexed → Student submissions → Retrieve context → Auto-mark with AI → Generate feedback and marks</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <linearGradient id="node" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>

    <linearGradient id="store" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>

    <linearGradient id="output" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title { font: 700 40px Arial, sans-serif; fill: #e2e8f0; }
      .subtitle { font: 400 20px Arial, sans-serif; fill: #94a3b8; }
      .label { font: 700 20px Arial, sans-serif; fill: #020617; }
      .sub { font: 500 14px Arial, sans-serif; fill: #0f172a; }
      .data-label { font: 700 20px Arial, sans-serif; fill: #1f2937; }
      .section { font: 600 16px Arial, sans-serif; fill: #fbbf24; }
      .arrow { stroke: #38bdf8; stroke-width: 4; fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1100" fill="url(#bg)"/>

  <text x="800" y="50" text-anchor="middle" class="title">📚 PHASE 1: AutoMark RAG</text>
  <text x="800" y="90" text-anchor="middle" class="subtitle">Intelligent Assessment Marking System for Teachers</text>

  <!-- SECTION 1: TEACHER UPLOAD -->
  <text x="85" y="135" class="section">📤 STEP 1: Teacher Upload and Ingestion</text>

  <rect x="60" y="155" rx="15" ry="15" width="220" height="85" fill="url(#node)" filter="url(#glow)"/>
  <text x="170" y="192" text-anchor="middle" class="label">1) Upload</text>
  <text x="170" y="213" text-anchor="middle" class="sub">PDF / PPT / PPTX</text>

  <rect x="340" y="155" rx="15" ry="15" width="220" height="85" fill="url(#node)" filter="url(#glow)"/>
  <text x="450" y="192" text-anchor="middle" class="label">2) Extract</text>
  <text x="450" y="213" text-anchor="middle" class="sub">Text and Visuals</text>

  <rect x="620" y="155" rx="15" ry="15" width="220" height="85" fill="url(#node)" filter="url(#glow)"/>
  <text x="730" y="192" text-anchor="middle" class="label">3) OCR</text>
  <text x="730" y="213" text-anchor="middle" class="sub">Tesseract</text>

  <rect x="900" y="155" rx="15" ry="15" width="260" height="85" fill="url(#store)" filter="url(#glow)"/>
  <text x="1030" y="192" text-anchor="middle" class="data-label">4) Store Raw</text>
  <text x="1030" y="213" text-anchor="middle" class="sub">CourseMaterialRaw</text>

  <!-- Arrows Row 1 -->
  <path class="arrow" d="M280,197 L340,197"/>
  <path class="arrow" d="M560,197 L620,197"/>
  <path class="arrow" d="M840,197 L900,197"/>

  <!-- SECTION 2: VECTOR PROCESSING -->
  <text x="85" y="295" class="section">🧠 STEP 2: Vector Processing and Storage</text>

  <rect x="110" y="315" rx="15" ry="15" width="220" height="85" fill="url(#node)" filter="url(#glow)"/>
  <text x="220" y="352" text-anchor="middle" class="label">5) Chunking</text>
  <text x="220" y="373" text-anchor="middle" class="sub">Size equals 400</text>

  <rect x="390" y="315" rx="15" ry="15" width="220" height="85" fill="url(#node)" filter="url(#glow)"/>
  <text x="500" y="352" text-anchor="middle" class="label">6) Embeddings</text>
  <text x="500" y="373" text-anchor="middle" class="sub">all-MiniLM-L6</text>

  <rect x="670" y="315" rx="15" ry="15" width="260" height="85" fill="url(#store)" filter="url(#glow)"/>
  <text x="800" y="352" text-anchor="middle" class="data-label">7) ChromaDB</text>
  <text x="800" y="373" text-anchor="middle" class="sub">Indexed by course_id</text>

  <!-- Arrow from Row 1 to Row 2 -->
  <path class="arrow" d="M1030,240 L1030,290 L800,290 L800,315"/>

  <!-- Arrows Row 2 -->
  <path class="arrow" d="M330,357 L390,357"/>
  <path class="arrow" d="M610,357 L670,357"/>

  <!-- SECTION 3: ASSESSMENT -->
  <text x="85" y="455" class="section">📝 STEP 3: Assessment and Student Submission</text>

  <rect x="60" y="475" rx="15" ry="15" width="220" height="85" fill="url(#node)" filter="url(#glow)"/>
  <text x="170" y="512" text-anchor="middle" class="label">8) Create Assess</text>
  <text x="170" y="533" text-anchor="middle" class="sub">Define Topics</text>

  <rect x="340" y="475" rx="15" ry="15" width="220" height="85" fill="url(#node)" filter="url(#glow)"/>
  <text x="450" y="512" text-anchor="middle" class="label">9) Generate Qs</text>
  <text x="450" y="533" text-anchor="middle" class="sub">Via Ollama</text>

  <rect x="620" y="475" rx="15" ry="15" width="220" height="85" fill="url(#node)" filter="url(#glow)"/>
  <text x="730" y="512" text-anchor="middle" class="label">10) Student</text>
  <text x="730" y="533" text-anchor="middle" class="sub">Submits Answer</text>

  <!-- Arrow from Row 2 to Row 3 -->
  <path class="arrow" d="M800,400 L800,430 L170,430 L170,475"/>

  <!-- Arrows Row 3 -->
  <path class="arrow" d="M280,517 L340,517"/>
  <path class="arrow" d="M560,517 L620,517"/>

  <!-- SECTION 4: AUTO-MARKING -->
  <text x="85" y="635" class="section">✅ STEP 4: Auto-Marking and Feedback Engine</text>

  <rect x="110" y="655" rx="15" ry="15" width="220" height="85" fill="url(#node)" filter="url(#glow)"/>
  <text x="220" y="692" text-anchor="middle" class="label">11) Query</text>
  <text x="220" y="713" text-anchor="middle" class="sub">ChromaDB</text>

  <rect x="390" y="655" rx="15" ry="15" width="220" height="85" fill="url(#node)" filter="url(#glow)"/>
  <text x="500" y="692" text-anchor="middle" class="label">12) Retrieve</text>
  <text x="500" y="713" text-anchor="middle" class="sub">Context top-k</text>

  <rect x="670" y="655" rx="15" ry="15" width="240" height="85" fill="url(#store)" filter="url(#glow)"/>
  <text x="790" y="692" text-anchor="middle" class="data-label">13) Auto-Mark</text>
  <text x="790" y="713" text-anchor="middle" class="sub">With AI Engine</text>

  <!-- Arrow from Row 3 to Row 4 -->
  <path class="arrow" d="M730,560 L730,600 L220,600 L220,655"/>

  <!-- Arrows Row 4 -->
  <path class="arrow" d="M330,697 L390,697"/>
  <path class="arrow" d="M610,697 L670,697"/>

  <!-- SECTION 5: OUTPUT -->
  <text x="85" y="815" class="section">📊 STEP 5: Output and Student Feedback</text>

  <rect x="60" y="835" rx="15" ry="15" width="200" height="85" fill="url(#output)" filter="url(#glow)"/>
  <text x="160" y="872" text-anchor="middle" class="label">14) Answer</text>
  <text x="160" y="893" text-anchor="middle" class="sub">Key PDF</text>

  <rect x="320" y="835" rx="15" ry="15" width="200" height="85" fill="url(#output)" filter="url(#glow)"/>
  <text x="420" y="872" text-anchor="middle" class="label">15) Marks</text>
  <text x="420" y="893" text-anchor="middle" class="sub">Plus Rubric</text>

  <rect x="580" y="835" rx="15" ry="15" width="240" height="85" fill="url(#output)" filter="url(#glow)"/>
  <text x="700" y="872" text-anchor="middle" class="label">16) Student</text>
  <text x="700" y="893" text-anchor="middle" class="sub">Feedback</text>

  <!-- Arrow from Row 4 to Row 5 -->
  <path class="arrow" d="M790,740 L790,770 L420,770 L420,835"/>

  <!-- Arrows Row 5 -->
  <path class="arrow" d="M260,877 L320,877"/>
  <path class="arrow" d="M520,877 L580,877"/>

  <!-- FOOTER -->
  <text x="800" y="1000" text-anchor="middle" class="subtitle">Complete Workflow: Upload - Ingest - Index - Assess - Mark - Feedback</text>
  <text x="800" y="1040" text-anchor="middle" class="sub" fill="#94a3b8">Status: uploaded extracted embedded queryable assessed marked</text>

  <!-- Animated dot -->
  <circle r="8" fill="#e0f2fe" filter="url(#glow)">
    <animateMotion dur="15s" repeatCount="indefinite" 
      path="M280,197 L340,197 L560,197 L620,197 L840,197 L900,197 L1030,240 L1030,290 L800,290 L800,315 L330,357 L390,357 L610,357 L670,357 L800,400 L800,430 L170,430 L170,475 L280,517 L340,517 L560,517 L620,517 L730,560 L730,600 L220,600 L220,655 L330,697 L390,697 L610,697 L670,697 L790,740 L790,770 L420,770 L420,835 L260,877 L320,877 L520,877 L580,877"/>
  </circle>
</svg>
<svg width="1600" height="1200" viewBox="0 0 1600 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Phase 1: AutoMark RAG - Intelligent Assessment Marking System</title>
  <desc id="desc">Complete flow: Teacher uploads course materials → Extract & Embed → ChromaDB indexed → Student submissions → Retrieve context → Auto-mark with AI → Generate feedback & marks</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <linearGradient id="node" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>

    <linearGradient id="store" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .subtitle { font: 400 20px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .label { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #020617; }
      .sub { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .data-label { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .arrow { stroke: #38bdf8; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .arrow-dashed { stroke: #fbbf24; stroke-width: 4; fill: none; stroke-dasharray: 12 8; stroke-linecap: round; }
      .pulse { opacity: 0; animation: pulse 8s linear infinite; }
      @keyframes pulse {
        0%, 100% { opacity: 0; }
        10%, 20% { opacity: 1; }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="860" fill="url(#bg)"/>

  <text x="800" y="50" text-anchor="middle" class="title">📚 PHASE 1: AutoMark RAG</text>
  <text x="800" y="95" text-anchor="middle" class="subtitle">Teacher Materials → Indexing → Assessment Generation → Student Marking → AI Feedback</text>

  <!-- ROW 1: TEACHER UPLOAD & INGESTION -->
  <text x="85" y="140" class="sub" fill="#fbbf24">📤 STEP 1: Teacher Upload & Ingestion</text>

  <rect x="60" y="160" rx="20" ry="20" width="220" height="90" fill="url(#node)" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;1" dur="12s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="170" y="200" text-anchor="middle" class="label">1) Upload</text>
  <text x="170" y="223" text-anchor="middle" class="sub">PDF / PPT / PPTX</text>

  <rect x="340" y="160" rx="20" ry="20" width="240" height="90" fill="url(#node)" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.08;0.15;1" dur="12s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="460" y="200" text-anchor="middle" class="label">2) Extract</text>
  <text x="460" y="223" text-anchor="middle" class="sub">Text + Visuals</text>

  <rect x="640" y="160" rx="20" ry="20" width="220" height="90" fill="url(#node)" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.15;0.22;0.28;1" dur="12s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="750" y="200" text-anchor="middle" class="label">3) OCR</text>
  <text x="750" y="223" text-anchor="middle" class="sub">Tesseract</text>

  <rect x="920" y="160" rx="20" ry="20" width="260" height="90" fill="url(#store)" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.22;0.28;0.35;0.4;1" dur="12s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="1050" y="200" text-anchor="middle" class="data-label">4) CourseMaterialRaw</text>
  <text x="1050" y="223" text-anchor="middle" class="sub">rawText + metadata</text>

  <!-- ROW 2: VECTOR PROCESSING -->
  <text x="85" y="320" class="sub" fill="#fbbf24">🧠 STEP 2: Vector Processing & Storage</text>

  <rect x="130" y="340" rx="20" ry="20" width="220" height="90" fill="url(#node)" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0;0;0;0;1;1" keyTimes="0;0.33;0.4;0.45;0.5;0.55;1" dur="12s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="240" y="380" text-anchor="middle" class="label">5) Chunking</text>
  <text x="240" y="403" text-anchor="middle" class="sub">size=400</text>

  <rect x="420" y="340" rx="20" ry="20" width="220" height="90" fill="url(#node)" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0;0;0;0;0;1;1" keyTimes="0;0.46;0.52;0.57;0.62;0.67;0.72;1" dur="12s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="530" y="380" text-anchor="middle" class="label">6) Embed</text>
  <text x="530" y="403" text-anchor="middle" class="sub">allMiniLM-L6</text>

  <rect x="710" y="340" rx="20" ry="20" width="260" height="90" fill="url(#store)" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0;0;0;0;0;0;1;1" keyTimes="0;0.58;0.64;0.69;0.74;0.79;0.84;0.88;1" dur="12s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="840" y="380" text-anchor="middle" class="data-label">7) ChromaDB</text>
  <text x="840" y="403" text-anchor="middle" class="sub">indexed by course_id</text>

  <!-- ROW 3: ASSESSMENT & SUBMISSION -->
  <text x="85" y="500" class="sub" fill="#fbbf24">📝 STEP 3: Assessment & Student Submission</text>

  <rect x="60" y="520" rx="20" ry="20" width="240" height="90" fill="url(#node)" filter="url(#glow)">
    <aniRROWS ROW 1 -->
